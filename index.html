<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fewa Customer App - Download</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      color: #e2e8f0;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    }

    .app-icon {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #f8fafc;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    /* Version list */
    .version-list {
      text-align: left;
      margin-bottom: 24px;
    }

    .version-list h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .version-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
      transition: background 0.2s ease;
    }

    .version-item:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .version-item.latest {
      border-color: rgba(59, 130, 246, 0.3);
      background: rgba(59, 130, 246, 0.08);
    }

    .version-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .version-tag {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .version-tag span {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    .badge-latest {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .version-date {
      font-size: 0.8rem;
      color: #64748b;
    }

    .version-notes {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .version-notes ul {
      list-style: none;
      padding: 0;
    }

    .version-notes ul li::before {
      content: "~";
      color: #3b82f6;
      font-weight: 700;
      margin-right: 8px;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .download-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .download-btn.older {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .download-btn.older:hover {
      background: rgba(255, 255, 255, 0.14);
      box-shadow: none;
    }

    .note {
      margin-top: 8px;
      font-size: 0.78rem;
      color: #475569;
      line-height: 1.5;
    }

    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.8rem;
      color: #475569;
    }

    @media (max-width: 480px) {
      .card { padding: 32px 20px; }
      h1 { font-size: 1.4rem; }
      .version-header { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="app-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="40" height="40">
      <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
      <line x1="12" y1="18" x2="12.01" y2="18"/>
    </svg>
  </div>

  <h1>Fewa Customer App</h1>
  <p class="subtitle">Official customer application for Android</p>

  <div class="version-list">
    <h2>Releases</h2>

    <!--
      HOW TO ADD A NEW VERSION:
      1. Add your new APK file to this repo (e.g. fewalunch-v1.1.0.apk)
      2. Copy a version-item block below and paste it at the TOP (above the previous latest)
      3. Add class="version-item latest" to the new one
      4. Remove "latest" class and badge from the old one
      5. Change the old download button class to "download-btn older"
      6. Commit and push
    -->

    <!-- v1.0.0 - LATEST -->
    <div class="version-item latest">
      <div class="version-header">
        <div class="version-tag">
          <span>v1.0.0</span>
          <span class="badge-latest">Latest</span>
        </div>
        <span class="version-date">Apr 28, 2026</span>
      </div>
      <div class="version-notes">
        <ul>
          <li>Initial release</li>
        </ul>
      </div>
      <a class="download-btn" href="fewalunch.apk">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download APK
      </a>
    </div>

    <!--
      EXAMPLE: When you add v1.1.0, it would look like this:

      <div class="version-item latest">
        <div class="version-header">
          <div class="version-tag">
            <span>v1.1.0</span>
            <span class="badge-latest">Latest</span>
          </div>
          <span class="version-date">May 10, 2026</span>
        </div>
        <div class="version-notes">
          <ul>
            <li>Added new feature X</li>
            <li>Fixed bug Y</li>
          </ul>
        </div>
        <a class="download-btn" href="fewalunch-v1.1.0.apk">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download APK
        </a>
      </div>

      And the v1.0.0 block above would become:
      - class="version-item" (remove "latest")
      - Remove the badge-latest span
      - Change download-btn to "download-btn older"
    -->

  </div>

  <p class="note">Enable "Install from unknown sources" in your Android settings before installing.</p>

  <div class="footer">
    &copy; 2026 Fewa Lunch. All rights reserved.
  </div>
</div>

</body>
</html>
