<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      color: #e2e8f0;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    }

    .app-icon {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #f8fafc;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .version-badge {
      display: inline-block;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 32px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
    }

    .info-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 14px 10px;
    }

    .info-item .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 4px;
    }

    .info-item .value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #cbd5e1;
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.4);
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.5);
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .download-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .note {
      margin-top: 20px;
      font-size: 0.78rem;
      color: #475569;
      line-height: 1.5;
    }

    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.8rem;
      color: #475569;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>

    </div>
    <div class="info-item">

</html>
